<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山东省高考志愿投档录取核对系统</title>
    
    <!-- 先尝试加载本地 sql-wasm.js，若失败/不存在则自动切换到网络 CDN -->
    <script src="sql-wasm.js" onerror="this.onerror=null; this.src='https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js';"></script>
    
    <!-- 先尝试加载本地 pdf.min.js，若失败/不存在则自动切换到网络 CDN -->
    <script src="pdf.min.js" onerror="this.onerror=null; this.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js';"></script>

    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
            min-height: 100vh;
            padding: 0 0 40px 0;
        }

        /* ===== 顶部导航 ===== */
        .header {
            background: #2563eb;
            color: #fff;
            padding: 14px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-right {
            display: flex;
            gap: 10px;
            font-size: 13px;
        }
        .status-badge {
            padding: 4px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.18);
            font-weight: 600;
        }
        .status-badge.red {
            background: #dc2626;
            color: #fff;
        }
        .status-badge.green {
            background: #16a34a;
            color: #fff;
        }
        .status-badge.yellow {
            background: #eab308;
            color: #1f2937;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 18px;
        }

        /* ===== 操作区 (两列) ===== */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 22px;
        }
        .action-left {
            flex: 0 0 340px;
            min-width: 280px;
        }
        .action-right {
            flex: 1;
            min-width: 300px;
        }

        /* ===== 卡片 ===== */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px 22px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
            margin-bottom: 18px;
        }
        .card-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-title .icon {
            font-size: 20px;
        }
        .card-title.blue { color: #2563eb; }
        .card-title.green { color: #16a34a; }
        .card-title.gray { color: #4b5563; }

        /* ===== 表单元素 ===== */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 3px;
        }
        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background: #fafbfc;
            transition: border 0.2s;
            color: #1f2937;
        }
        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            background: #fff;
        }
        .form-control.orange-bg {
            background: #fffbeb;
            border-color: #f59e0b;
            font-weight: 600;
            color: #b45309;
        }
        .form-control.orange-bg:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }
        .file-input-wrap input[type="file"] {
            display: block;
            width: 100%;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
            border: 1px dashed #d1d5db;
            border-radius: 6px;
            background: #f9fafb;
            padding: 8px 10px;
        }
        .file-input-wrap input[type="file"]:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .file-input-wrap input[type="file"]::-webkit-file-upload-button {
            background: #e5e7eb;
            border: 0;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            color: #1f2937;
            cursor: pointer;
            margin-right: 12px;
        }

        /* ===== 按钮 ===== */
        .btn {
            display: inline-block;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, box-shadow 0.2s;
            width: 100%;
            color: #fff;
        }
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-export {
            background: #059669;
            width: auto;
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-export:hover { background: #047857; }

        /* ===== 统计看板 ===== */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            background: #eff6ff;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
        }
        .stat-item {
            flex: 1;
            font-size: 14px;
        }
        .stat-item span {
            font-weight: bold;
            font-size: 16px;
            color: #1d4ed8;
        }

        /* ===== 结果提示框 ===== */
        .alert {
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid transparent;
            margin-bottom: 18px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
        .alert-danger { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
        .alert-title { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
        .alert-text { font-size: 14px; line-height: 1.6; }

        /* ===== 表格区 ===== */
        .table-wrap {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            margin-top: 8px;
        }
        .table-header {
            background: #f3f4f6;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .table-header .title { font-weight: 700; color: #374151; font-size: 16px; }
        .table-header .count { font-size: 12px; color: #6b7280; }
        .table-scroll { overflow-x: auto; max-height: 520px; overflow-y: auto; }
        .table-scroll table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
        .table-scroll th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
        .table-scroll td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        
        /* 状态标签 */
        .tag { display: inline-block; padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .tag-pass-final { background: #10b981; color: #ffffff; box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3); }
        .tag-pass { background: #dbeafe; color: #1e40af; }
        .tag-fail { background: #fde8e8; color: #9b1c1c; }
        .tag-none { background: #f3f4f6; color: #6b7280; }

        /* 高亮行样式 */
        .row-final-highlight {
            background: linear-gradient(to right, #ecfdf5, #fff) !important;
            font-weight: bold;
            border-left: 6px solid #10b981;
        }
        .row-final-highlight td { color: #047857 !important; border-bottom-color: #a7f3d0 !important; }
        .row-pass-intercept { background: #f0fdfa; border-left: 4px solid #3b82f6; }

        .text-mono { font-family: "Courier New", monospace; }
        .inline-code { background: #eff6ff; color: #1d4ed8; padding: 0 6px; border-radius: 4px; font-family: "Courier New", monospace; font-size: 12px; }
        .inline-code.purple { background: #f3e8ff; color: #7c3aed; }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="header">
        <h1>🎓 山东省高考志愿投档录取核对系统</h1>
        <div class="header-right">
            <span class="status-badge red" id="dbStatus">🔴 数据库未加载</span>
            <span class="status-badge red" id="pdfStatus">🔴 PDF未解析</span>
        </div>
    </header>

    <!-- ===== 主容器 ===== -->
    <div class="container">
        <div class="action-row">
            <!-- 左列 -->
            <div class="action-left">
                <div class="card">
                    <div class="card-title blue"><span class="icon">📂</span> 第一步：加载数据库 *.db</div>
                    <div class="file-input-wrap">
                        <input type="file" id="dbFile" accept=".db" />
                    </div>
                </div>

                <div class="card">
                    <div class="card-title gray"><span class="icon">🔍</span> 手动精确查找</div>
                    <div class="form-group">
                        <label>院校代号 / 院校名称</label>
                        <input type="text" id="searchSchool" placeholder="例如: A423" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label>专业代号 / 专业名称</label>
                        <input type="text" id="searchMajor" placeholder="例如: 06" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label>您的位次</label>
                        <input type="number" id="searchRank" placeholder="请输入位次" class="form-control" />
                    </div>
                    <button onclick="handleManualSearch()" class="btn btn-primary">立即查询</button>
                </div>
            </div>

            <!-- 右列 -->
            <div class="action-right">
                <div class="card">
                    <div class="card-title green"><span class="icon">📋</span> 第二步：上传志愿PDF自动比对</div>
                    <div class="form-group">
                        <label>第一步：输入您的精准高考位次 (必填)</label>
                        <input type="number" id="studentRank" placeholder="请输入您的位次，如：40127" class="form-control orange-bg" />
                    </div>
                    <div class="form-group">
                        <label>第二步：选择您的志愿填报PDF文件</label>
                        <div class="file-input-wrap">
                            <input type="file" id="pdfFile" accept=".pdf" />
                        </div>
                    </div>
                    <button onclick="analyzeVolunteers()" class="btn btn-success" style="margin-top:4px;">
                        🚀 开始全自动解析并核对录取志愿
                    </button>
                </div>
                <div id="resultAlert" class="alert"></div>
            </div>
        </div>

        <!-- ===== 表格区 ===== -->
        <div class="table-wrap" style="margin-top:10px;">
            <div class="table-header">
                <div>
                    <span class="title" id="tableTitle">📊 志愿表投档模拟完整比对清单</span>
                    <span class="count" id="resultCount">共 0 条志愿 data</span>
                </div>
                <button id="exportBtn" onclick="exportToCSV()" class="btn btn-export" style="display:none;">📥 导出 CSV 对比清单</button>
            </div>
            
            <div id="statsBar" class="stats-bar" style="display:none;">
                <div class="stat-item">志愿总数: <span id="totalVolCount">0</span> 条</div>
                <div class="stat-item">符合过线条件志愿: <span id="passedVolCount">0</span> 条</div>
                <div class="stat-item">过线志愿占比: <span id="passedVolRatio">0%</span></div>
            </div>

            <div class="table-scroll">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th style="width:70px;">志愿号</th>
                            <th>院校信息</th>
                            <th>专业信息</th>
                            <th style="width:90px;">投档线</th>
                            <th style="width:80px;">您的位次</th>
                            <th style="width:140px;">比对状态</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        <tr class="empty-row">
                            <td colspan="6">暂无数据，请先加载数据库与PDF文件。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== JAVASCRIPT 逻辑控制层 ===== -->
    <script>
        var dbInstance = null;
        var parsedPdfText = "";
        var dbTables = []; 
        var lastAnalysedData = []; 

        // 检测依赖项准备完毕后初始化
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof initSqlJs !== 'undefined') {
                initDatabaseLoader();
            } else {
                // 如果异步加载稍慢，通过轮询确保拉取成功
                var interval = setInterval(function() {
                    if (typeof initSqlJs !== 'undefined') {
                        clearInterval(interval);
                        initDatabaseLoader();
                    }
                }, 200);
            }
            initPdfReader();
        });

        function initDatabaseLoader() {
            initSqlJs({ locateFile: function(file) { return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + file; } }).then(function(SQL) {
                var dbStatus = document.getElementById('dbStatus');
                dbStatus.innerHTML = '⏳ 请导入数据库 *.db';
                dbStatus.className = 'status-badge yellow';

                document.getElementById('dbFile').addEventListener('change', function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function() {
                        try {
                            var uints = new Uint8Array(reader.result);
                            dbInstance = new SQL.Database(uints);
                            
                            dbTables = [];
                            var tableQuery = dbInstance.prepare("SELECT name FROM sqlite_master WHERE type='table' AND name LIKE 't_%'");
                            while(tableQuery.step()) {
                                dbTables.push(tableQuery.getAsObject().name);
                            }
                            tableQuery.free();

                            var st = document.getElementById('dbStatus');
                            st.innerHTML = '🟢 数据库已就绪';
                            st.className = 'status-badge green';
                        } catch (err) {
                            alert('数据库文件读取失败: ' + err);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                });
            });
        }

        function initPdfReader() {
            document.getElementById('pdfFile').addEventListener('change', function(e) {
                if (typeof pdfjsLib === 'undefined') {
                    alert("PDF.js 依赖尚未加载完成，请稍候片刻再试。");
                    return;
                }
                var file = e.target.files[0];
                if (!file) return;

                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                var pdfStatus = document.getElementById('pdfStatus');
                pdfStatus.innerHTML = '⏳ 正在解析PDF...';
                pdfStatus.className = 'status-badge yellow';
                parsedPdfText = '';

                var reader = new FileReader();
                reader.onload = function() {
                    try {
                        var typedarray = new Uint8Array(this.result);
                        pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                            var fullText = '';
                            var pagePromises = [];
                            for (var i = 1; i <= pdf.numPages; i++) {
                                pagePromises.push(pdf.getPage(i).then(function(page) {
                                    return page.getTextContent().then(function(textContent) {
                                        var pageText = '';
                                        for (var j = 0; j < textContent.items.length; j++) {
                                            pageText += textContent.items[j].str + ' ';
                                        }
                                        return pageText;
                                    });
                                }));
                            }
                            Promise.all(pagePromises).then(function(pagesText) {
                                for (var k = 0; k < pagesText.length; k++) { fullText += pagesText[k] + '\n'; }
                                parsedPdfText = fullText;
                                var st = document.getElementById('pdfStatus');
                                st.innerHTML = '🟢 PDF解析完成';
                                st.className = 'status-badge green';
                            });
                        }).catch(function(err) {
                            pdfStatus.innerHTML = '🔴 PDF解析失败';
                            pdfStatus.className = 'status-badge red';
                        });
                    } catch (err) {
                        pdfStatus.innerHTML = '🔴 PDF解析失败';
                        pdfStatus.className = 'status-badge red';
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function queryDatabaseAdaptively(schoolCode, majorCode) {
            if(!dbTables || dbTables.length === 0) dbTables = ['t_2026', 't_2025', 't_2024'];
            for (var t = 0; t < dbTables.length; t++) {
                try {
                    var query = 'SELECT 最低位次, 院校名称, 专业名称 FROM ' + dbTables[t] + ' WHERE 院校代号 = ? AND 专业代号 = ? LIMIT 1';
                    var stmt = dbInstance.prepare(query);
                    stmt.bind([schoolCode, majorCode]);
                    if (stmt.step()) {
                        var res = stmt.getAsObject();
                        stmt.free();
                        return { minRank: res['最低位次'] || 999999, schoolName: res['院校名称'], majorName: res['专业名称'] };
                    }
                    stmt.free();
                } catch(e) {}
            }
            return null;
        }

        function parseVolunteerText(text) {
            var cleanText = text.replace(/\|/g, ' ').replace(/\s+/g, ' ');
            var schoolMatches = [];
            var schoolRegex = /\b([A-Z][0-9]{3})\b/g;
            var sMatch;
            while ((sMatch = schoolRegex.exec(cleanText)) !== null) {
                schoolMatches.push({ code: sMatch[1], index: sMatch.index });
            }
            if (schoolMatches.length === 0) return [];

            var volunteers = [];
            for (var i = 0; i < schoolMatches.length; i++) {
                var start = schoolMatches[i].index;
                var end = (i + 1 < schoolMatches.length) ? schoolMatches[i + 1].index : start + 300;
                var block = cleanText.substring(start, end);
                var lookBack = cleanText.substring(Math.max(0, start - 30), start);
                var numMatch = lookBack.match(/(?:\b|^)(\d{1,3})\s*$/) || block.match(/^\s*([A-Z][0-9]{3})\s+(\d{1,3})/);
                var volNum = numMatch ? parseInt(numMatch[1], 10) : (i + 1);
                if (volNum > 120 || volNum <= 0) volNum = i + 1;

                var majorCode = '未知';
                var majorName = '未知专业';
                var searchArea = block.replace(schoolMatches[i].code, '');
                var codes = searchArea.match(/\b([A-Z0-9]{2})\b/g) || [];
                var validCodes = [];
                for (var c = 0; c < codes.length; c++) {
                    if (!/^(本|专|公|民|大类)$/.test(codes[c])) validCodes.push(codes[c]);
                }
                if (validCodes.length > 0) {
                    majorCode = validCodes[0];
                    var idx = searchArea.indexOf(majorCode);
                    var rawName = searchArea.substring(idx + 2).trim();
                    var nameParts = rawName.split(/(本科|专科|\d{4,5}|公办|民办)/);
                    majorName = nameParts[0] ? nameParts[0].trim() : rawName.trim();
                }
                var schoolName = searchArea.split(/(公办院校|民办院校|常规批|独立学院|\b[A-Z0-9]{2}\b)/)[0] || '';
                schoolName = schoolName.replace(/^\d+\s*/, '').replace(/[\s、|:：]+/g, '');
                majorName = majorName.replace(/^[\s、|:：.]+/, '');

                volunteers.push({ num: volNum, schoolCode: schoolMatches[i].code, schoolName: schoolName || '未识别学校', majorCode: majorCode, majorName: majorName || '未识别专业' });
            }

            var seen = {};
            var finalVolunteers = [];
            for (var v = 0; v < volunteers.length; v++) {
                var key = volunteers[v].schoolCode + '-' + volunteers[v].majorCode;
                if (!seen[key]) {
                    seen[key] = true;
                    volunteers[v].num = finalVolunteers.length + 1;
                    finalVolunteers.push(volunteers[v]);
                }
            }
            finalVolunteers.sort(function(a, b) { return a.num - b.num; });
            return finalVolunteers;
        }

        function analyzeVolunteers() {
            if (!dbInstance) { alert('请先导入您的 baokao.db 数据库文件！'); return; }
            var myRank = parseInt(document.getElementById('studentRank').value, 10);
            if (!myRank || myRank <= 0) { alert('请输入您正确的高考位次！'); return; }
            if (!parsedPdfText) { alert('未检测到已成功解析的 PDF 数据！'); return; }

            var volunteerList = parseVolunteerText(parsedPdfText);
            if (volunteerList.length === 0) { alert('无法从该PDF中解析出有效的行结构。'); return; }

            var htmlHtml = '';
            var admittedVolunteer = null;
            var totalCount = volunteerList.length;
            var passedCount = 0;
            lastAnalysedData = []; 

            for (var vi = 0; vi < volunteerList.length; vi++) {
                var vol = volunteerList[vi];
                var dbRes = queryDatabaseAdaptively(vol.schoolCode, vol.majorCode);

                var minRank = 999999;
                var dbSchoolName = vol.schoolName;
                var dbMajorName = vol.majorName;

                if (dbRes) {
                    minRank = dbRes.minRank;
                    dbSchoolName = dbRes.schoolName;
                    dbMajorName = dbRes.majorName;
                }

                var isPass = (myRank <= minRank && minRank !== 999999);
                var statusClass = 'tag-fail';
                var statusText = '未过线';
                var rowClass = '';

                if (minRank === 999999) {
                    statusClass = 'tag-none';
                    statusText = '无数据';
                } else if (isPass) {
                    passedCount++; 
                    if (!admittedVolunteer) {
                        admittedVolunteer = { num: vol.num, schoolCode: vol.schoolCode, majorCode: vol.majorCode, dbSchoolName: dbSchoolName, dbMajorName: dbMajorName, minRank: minRank, myRank: myRank };
                        statusClass = 'tag-pass-final';
                        statusText = '🏆 最终录取';
                        rowClass = 'row-final-highlight'; 
                    } else {
                        statusClass = 'tag-pass';
                        statusText = '过线 (已被前志愿截断)';
                        rowClass = 'row-pass-intercept';
                    }
                }

                htmlHtml += '<tr class="' + rowClass + '">' +
                    '<td class="text-mono">' + vol.num + '</td>' +
                    '<td><span class="inline-code">' + vol.schoolCode + '</span> ' + dbSchoolName + '</td>' +
                    '<td><span class="inline-code purple">' + vol.majorCode + '</span> ' + dbMajorName + '</td>' +
                    '<td class="text-mono">' + (minRank === 999999 ? '无数据' : minRank) + '</td>' +
                    '<td class="text-mono">' + myRank + '</td>' +
                    '<td><span class="tag ' + statusClass + '">' + statusText + '</span></td>' +
                    '</tr>';
                
                lastAnalysedData.push({ "志愿号": vol.num, "院校代号": vol.schoolCode, "院校名称": dbSchoolName, "专业代号": vol.majorCode, "专业名称": dbMajorName, "投档线位次": (minRank === 999999 ? '无数据' : minRank), "我的位次": myRank, "比对状态": statusText });
            }

            document.getElementById('tableTitle').innerHTML = '📊 志愿表投档模拟完整比对清单';
            document.getElementById('resultCount').innerHTML = '共比对 ' + totalCount + ' 个志愿';
            document.getElementById('resultBody').innerHTML = htmlHtml;

            document.getElementById('totalVolCount').innerText = totalCount;
            document.getElementById('passedVolCount').innerText = passedCount;
            var ratioStr = totalCount > 0 ? ((passedCount / totalCount) * 100).toFixed(2) + '%' : '0%';
            document.getElementById('passedVolRatio').innerText = ratioStr;
            
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('exportBtn').style.display = 'inline-block';

            var alertBox = document.getElementById('resultAlert');
            alertBox.className = 'alert show';
            if (admittedVolunteer) {
                alertBox.className = 'alert show alert-success';
                alertBox.innerHTML = '<div class="alert-title">🎉 恭喜您！系统成功匹配到您的最终录取结果！</div>' +
                    '<div class="alert-text">平行志愿判定：您将在 <b>第 ' + admittedVolunteer.num + ' 个志愿</b> 被正式录取：<br>' +
                    '录取院校：<b>[' + admittedVolunteer.schoolCode + '] ' + admittedVolunteer.dbSchoolName + '</b><br>' +
                    '录取专业：<b>[' + admittedVolunteer.majorCode + '] ' + admittedVolunteer.dbMajorName + '</b><br>' +
                    '您的位次：<b>' + admittedVolunteer.myRank + '</b>，该专业最低投档线：<b>' + admittedVolunteer.minRank + '</b>，成功过线！全部志愿中您共过线 <b>' + passedCount + '</b> 个，总占比 <b>' + ratioStr + '</b>。祝前程似锦！</div>';
            } else {
                alertBox.className = 'alert show alert-danger';
                alertBox.innerHTML = '<div class="alert-title">😞 提示：本次投档志愿未有录取匹配。</div><div class="alert-text">您当前的位次未能达到已解析志愿的最低投档要求。</div>';
            }
        }

        function handleManualSearch() {
            if (!dbInstance) { alert('请先导入 baokao.db 数据库文件！'); return; }
            var school = document.getElementById('searchSchool').value.trim();
            var major = document.getElementById('searchMajor').value.trim();
            var rank = parseInt(document.getElementById('searchRank').value, 10);

            var htmlHtml = '';
            var count = 0;
            lastAnalysedData = []; 

            for(var t=0; t<dbTables.length; t++) {
                var currentTable = dbTables[t];
                var yearLabel = currentTable.replace('t_', '') + '年';
                var conditions = [];
                var params = [];

                if (school) { conditions.push('(院校代号 = ? OR 院校名称 LIKE ?)'); params.push(school, '%' + school + '%'); }
                if (major) { conditions.push('(专业代号 = ? OR 专业名称 LIKE ?)'); params.push(major, '%' + major + '%'); }
                if (!isNaN(rank) && rank > 0) { conditions.push('最低位次 >= ?'); params.push(rank); }

                var whereClause = conditions.length > 0 ? 'WHERE ' + conditions.join(' AND ') : '';
                var query = 'SELECT 院校代号, 院校名称, 专业代号, 专业名称, 最低位次 FROM ' + currentTable + ' ' + whereClause + ' ORDER BY 最低位次 ASC LIMIT 50';

                try {
                    var stmt = dbInstance.prepare(query);
                    stmt.bind(params);
                    while (stmt.step()) {
                        count++;
                        var row = stmt.getAsObject();
                        var isPass = (!isNaN(rank) && rank > 0) ? (rank <= row['最低位次']) : true;
                        var statusCls = isPass ? 'tag-pass' : 'tag-fail';
                        var statusTxt = (!isNaN(rank) && rank > 0) ? (isPass ? '过线' : '未过线') : '检索成功';

                        htmlHtml += '<tr>' +
                            '<td class="text-mono" style="color:#9ca3af;">' + yearLabel + '</td>' +
                            '<td><span class="inline-code">' + row['院校代号'] + '</span> ' + row['院校名称'] + '</td>' +
                            '<td><span class="inline-code purple">' + row['专业代号'] + '</span> ' + row['专业名称'] + '</td>' +
                            '<td class="text-mono">' + (row['最低位次'] === 999999 ? '无数据' : row['最低位次']) + '</td>' +
                            '<td class="text-mono">' + (isNaN(rank) || rank <= 0 ? '-' : rank) + '</td>' +
                            '<td><span class="tag ' + statusCls + '">' + statusTxt + '</span></td>' +
                            '</tr>';
                        
                        lastAnalysedData.push({ "志愿号": yearLabel, "院校代号": row['院校代号'], "院校名称": row['院校名称'], "专业代号": row['专业代号'], "专业名称": row['专业名称'], "投档线位次": row['最低位次'], "我的位次": (isNaN(rank) ? '-' : rank), "比对状态": statusTxt });
                    }
                    stmt.free();
                } catch (err) {}
            }

            if (count === 0) {
                htmlHtml = '<tr class="empty-row"><td colspan="6">未检索到匹配结果。</td></tr>';
                document.getElementById('exportBtn').style.display = 'none';
            } else {
                document.getElementById('exportBtn').style.display = 'inline-block';
            }

            document.getElementById('tableTitle').innerHTML = '🔍 手动多表智能全数据检索结果';
            document.getElementById('resultCount').innerHTML = '共查出 ' + count + ' 条跨表匹配结果';
            document.getElementById('resultBody').innerHTML = htmlHtml;
            document.getElementById('resultAlert').className = 'alert';
            document.getElementById('statsBar').style.display = 'none'; 
        }

        function exportToCSV() {
            if (!lastAnalysedData || lastAnalysedData.length === 0) { alert("当前暂无可导出的数据！"); return; }
            var headers = ["志愿号/年份", "院校代号", "院校名称", "专业代号", "专业名称", "投档线最低位次", "考生位次", "判定状态"];
            var csvContent = [];
            csvContent.push(headers.join(","));

            for (var i = 0; i < lastAnalysedData.length; i++) {
                var item = lastAnalysedData[i];
                var row = [
                    item["志愿号"],
                    item["院校代号"],
                    '"' + item["院校名称"].replace(/"/g, '""') + '"',
                    item["专业代号"],
                    '"' + item["专业名称"].replace(/"/g, '""') + '"',
                    item["投档线位次"],
                    item["我的位次"],
                    item["比对状态"]
                ];
                csvContent.push(row.join(","));
            }

            var csvString = csvContent.join("\n");
            // 修复了致命的单引号包裹问题：添加开头的单引号，确保 \uFEFF 正常工作
            var blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "高考志愿投档核对清单_" + new Date().getTime() + ".csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
